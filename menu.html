        * {
            margin: 0px;
            padding: 0px;
        }

        body {
            background-image: url("https://files.123freevectors.com/wp-content/original/119625-white-abstract-background-vector.jpg");
            background-repeat: no-repeat;
            background-size: cover;
        }

        .navbar {
            display: flex;
            flex-direction: row;
            justify-content: space-between;
        }

        .nav-logo {
            font-family: "Whisper", cursive;
            font-weight: bold;
            font-size: 50px;
            font-style: normal;
            padding-left: 30px;
            filter: drop-shadow(10px 10px 10px black);
        }

        .navbar-right {
            color: white;

        }

        .navbar-right a {
            text-decoration: none;
        }

        a {
            padding: 10px;
            margin: 10px;
            border-radius: 30px;
            font-family: "Pacifico", cursive;
            font-weight: 800;
            font-style: normal;
            font-size: 20px;
            color: black;

        }

        a:hover {
            background-color: rgb(236, 63, 63);
            color: black;
        }

        .menu-cards {
            padding: 30px;
            transition: transform 0.2s ease;
        }

        .menu-cards:hover {
            transform: scale(1.1)
        }

        .card {
            border: 2px solid black;
            border-radius: 20px;
        }

        .card-img-top {
            cursor: pointer;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
        }

        .card-text {
            text-align: center;
            font-weight: 500;
        }

        .card-body {
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
        }

        .card-body:hover {
            color: white;
            background-color: black;
        }
    </style>
</head>
